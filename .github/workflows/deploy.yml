name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # ── Polygon RPC ────────────────────────────────────────────────────
          VITE_POLYGON_RPC_URL: ${{ secrets.VITE_POLYGON_RPC_URL }}
          # ── Magic Embedded Wallet ──────────────────────────────────────────
          VITE_MAGIC_PUBLISHABLE_KEY: ${{ secrets.VITE_MAGIC_PUBLISHABLE_KEY }}
          # ── Polymarket Builder Program ─────────────────────────────────────
          # The builder SECRET must NEVER be set here — it belongs in a
          # server-side signing proxy only (see README for details).
          VITE_POLYMARKET_BUILDER_API_KEY: ${{ secrets.VITE_POLYMARKET_BUILDER_API_KEY }}
          VITE_POLYMARKET_BUILDER_PASSPHRASE: ${{ secrets.VITE_POLYMARKET_BUILDER_PASSPHRASE }}
          VITE_POLYMARKET_BUILDER_RELAY_SIGN_URL: ${{ secrets.VITE_POLYMARKET_BUILDER_RELAY_SIGN_URL }}
          # ── Payment gateways ───────────────────────────────────────────────
          VITE_PAYPAL_CLIENT_ID: ${{ secrets.VITE_PAYPAL_CLIENT_ID }}
          VITE_COINBASE_CHECKOUT_ID: ${{ secrets.VITE_COINBASE_CHECKOUT_ID }}
          VITE_PAYFAST_MERCHANT_ID: ${{ secrets.VITE_PAYFAST_MERCHANT_ID }}
          VITE_PAYFAST_MERCHANT_KEY: ${{ secrets.VITE_PAYFAST_MERCHANT_KEY }}
          VITE_PAYFAST_SANDBOX: ${{ secrets.VITE_PAYFAST_SANDBOX }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
